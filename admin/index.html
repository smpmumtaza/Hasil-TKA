<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Hasil TKA SMP Mumtaza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #f1f5f9; }
    </style>
</head>
<body>

<div id="app" class="min-h-screen">

    <!-- ========== LOGIN ========== -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-xl mb-3">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <h1 class="text-xl font-bold text-gray-900">Admin Panel</h1>
                <p class="text-sm text-gray-500 mt-1">Masuk untuk memantau pengiriman</p>
            </div>
            <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg p-3 mb-4"></div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" value="admin" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none" />
                </div>
                <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg text-sm transition">Masuk</button>
            </form>
        </div>
    </div>

    <!-- ========== DASHBOARD ========== -->
    <div id="dashboardScreen" class="hidden">
        <nav class="bg-white border-b border-gray-200 shadow-sm">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-sm font-bold text-gray-900">Admin Panel</h2>
                        <p class="text-xs text-gray-500">Pantau Pengiriman Hasil TKA</p>
                    </div>
                </div>
                <button onclick="logout()" class="text-sm text-gray-500 hover:text-red-600 font-medium flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Keluar
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8">

            <!-- Stat Cards -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
                    <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">Total</p>
                    <p id="statTotal" class="text-2xl font-bold text-gray-900 mt-1">0</p>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
                    <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">Sukses</p>
                    <p id="statSukses" class="text-2xl font-bold text-green-600 mt-1">0</p>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
                    <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">Gagal</p>
                    <p id="statGagal" class="text-2xl font-bold text-red-600 mt-1">0</p>
                </div>
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
                    <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">Error</p>
                    <p id="statError" class="text-2xl font-bold text-yellow-600 mt-1">0</p>
                </div>
            </div>

            <!-- Filter & Refresh -->
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 mb-4">
                <div class="flex items-center gap-3">
                    <input type="text" id="searchInput" placeholder="Cari email/NISN..." oninput="filterLogs()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm w-64 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none" />
                    <select id="statusFilter" onchange="filterLogs()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500/20">
                        <option value="all">Semua Status</option>
                        <option value="SUKSES">Sukses</option>
                        <option value="GAGAL">Gagal</option>
                        <option value="ERROR">Error</option>
                    </select>
                </div>
                <button onclick="loadLogs()" id="refreshBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>

            <!-- Loading -->
            <div id="loading" class="hidden text-center py-12">
                <div class="spinner mx-auto mb-3" style="border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;width:32px;height:32px;animation:spin 0.7s linear infinite;"></div>
                <p class="text-sm text-gray-400">Memuat data...</p>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                            <th class="px-4 py-3 whitespace-nowrap">Waktu</th>
                            <th class="px-4 py-3 whitespace-nowrap">Email</th>
                            <th class="px-4 py-3 whitespace-nowrap">NISN</th>
                            <th class="px-4 py-3 whitespace-nowrap">Tanggal</th>
                            <th class="px-4 py-3 whitespace-nowrap">File</th>
                            <th class="px-4 py-3 whitespace-nowrap">Status</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="divide-y divide-gray-50"></tbody>
                </table>
                <div id="emptyState" class="hidden text-center py-12 text-gray-400 text-sm">
                    <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                    </svg>
                    Belum ada data pengiriman.
                </div>
            </div>

        </main>
    </div>
</div>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbye5qcIW5JPCmjGFURyNRC9KOPQYLaZioyluWD-n_DC5ukIWl7eYBIM83pgl6gKs3ld/exec'; // GANTI dengan URL web app yang sama
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'admin123';

let logs = [];

// Login
document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const err = document.getElementById('loginError');

    if (user === ADMIN_USER && pass === ADMIN_PASS) {
        sessionStorage.setItem('tka_admin', '1');
        showDashboard();
    } else {
        err.classList.remove('hidden');
        err.textContent = 'Username atau password salah.';
    }
});

function logout() {
    sessionStorage.removeItem('tka_admin');
    document.getElementById('dashboardScreen').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
}

function showDashboard() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboardScreen').classList.remove('hidden');
    loadLogs();
}

// Load logs
async function loadLogs() {
    const loading = document.getElementById('loading');
    const refreshBtn = document.getElementById('refreshBtn');
    loading.classList.remove('hidden');
    refreshBtn.disabled = true;

    try {
        const url = WEB_APP_URL + '?action=getLogs&token=' + ADMIN_PASS;
        const res = await fetch(url);
        logs = await res.json();
        updateStats();
        filterLogs();
    } catch (err) {
        document.getElementById('logTableBody').innerHTML = `
            <tr><td colspan="6" class="text-center py-8 text-red-500 text-sm">Gagal memuat data. Pastikan web app sudah dideploy.</td></tr>
        `;
    } finally {
        loading.classList.add('hidden');
        refreshBtn.disabled = false;
    }
}

function updateStats() {
    const total = logs.length;
    const sukses = logs.filter(l => l.Status === 'SUKSES').length;
    const gagal = logs.filter(l => l.Status && l.Status.startsWith('GAGAL')).length;
    const error = logs.filter(l => l.Status === 'ERROR').length;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statSukses').textContent = sukses;
    document.getElementById('statGagal').textContent = gagal;
    document.getElementById('statError').textContent = error;
}

function filterLogs() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;

    let filtered = logs;
    if (search) {
        filtered = filtered.filter(l =>
            (l.Email && l.Email.toLowerCase().includes(search)) ||
            (l.NISN && l.NISN.toLowerCase().includes(search))
        );
    }
    if (status !== 'all') {
        if (status === 'GAGAL') {
            filtered = filtered.filter(l => l.Status && l.Status.startsWith('GAGAL'));
        } else {
            filtered = filtered.filter(l => l.Status === status);
        }
    }

    const tbody = document.getElementById('logTableBody');
    const empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
    }
    empty.classList.add('hidden');

    tbody.innerHTML = filtered.map(l => {
        let badge = '';
        const st = (l.Status || '').toUpperCase();
        if (st === 'SUKSES') {
            badge = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 border border-green-200">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Sukses
            </span>`;
        } else if (st.startsWith('GAGAL')) {
            badge = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 border border-red-200">
                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> ${l.Status}
            </span>`;
        } else if (st === 'ERROR') {
            badge = `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 border border-yellow-200">
                <span class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></span> Error
            </span>`;
        } else {
            badge = `<span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600">${l.Status || '-'}</span>`;
        }

        const waktu = l.Timestamp ? new Date(l.Timestamp).toLocaleString('id-ID', {
            day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
        }) : '-';

        return `<tr class="hover:bg-gray-50/50 transition">
            <td class="px-4 py-3 text-gray-500 whitespace-nowrap text-xs">${waktu}</td>
            <td class="px-4 py-3 font-medium text-gray-700 whitespace-nowrap">${l.Email || '-'}</td>
            <td class="px-4 py-3 text-gray-600 whitespace-nowrap">${l.NISN || '-'}</td>
            <td class="px-4 py-3 text-gray-600 whitespace-nowrap">${l.Tanggal || '-'}</td>
            <td class="px-4 py-3 text-gray-500 text-xs max-w-[140px] truncate">${l.File || '-'}</td>
            <td class="px-4 py-3 whitespace-nowrap">${badge}</td>
        </tr>`;
    }).join('');
}

// Auto login if session exists
if (sessionStorage.getItem('tka_admin') === '1') {
    showDashboard();
}
</script>
</body>
</html>
