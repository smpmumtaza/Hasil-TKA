<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengiriman Hasil TKA SMP Mumtaza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .card-shadow {
            box-shadow: 0 20px 60px -12px rgba(0,0,0,0.08), 0 8px 24px -6px rgba(0,0,0,0.03);
        }
        .input-transition {
            transition: all 0.2s ease;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-check {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.5s ease-out forwards;
        }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4 md:p-6">

<div class="w-full max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-200">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900">Ambil Hasil TKA</h1>
        <p class="text-gray-500 mt-2 text-sm md:text-base">Masukkan data Anda untuk mendapatkan tautan dokumen hasil Tes Kemampuan Akademik</p>
    </div>

    <!-- Card Form -->
    <div class="bg-white rounded-2xl card-shadow p-6 md:p-8 border border-gray-100">

        <!-- Alert -->
        <div id="alert" class="hidden mb-6 p-4 rounded-xl text-sm font-medium flex items-start gap-3" role="alert">
            <span id="alertIcon" class="flex-shrink-0 mt-0.5"></span>
            <span id="alertMessage"></span>
            <button onclick="document.getElementById('alert').classList.add('hidden')" class="ml-auto flex-shrink-0 text-gray-400 hover:text-gray-600">&times;</button>
        </div>

        <form id="formTKA" class="space-y-5">

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email Tujuan</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </span>
                    <input type="email" id="email" name="email" required
                           class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none input-transition"
                           placeholder="contoh@email.com" />
                </div>
            </div>

            <!-- NISN + Date row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="nisn" class="block text-sm font-semibold text-gray-700 mb-1.5">NISN</label>
                    <input type="text" id="nisn" name="nisn" required maxlength="10" inputmode="numeric" pattern="\d*"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none input-transition"
                           placeholder="0107612901" />
                </div>
                <div>
                    <label for="tanggal" class="block text-sm font-semibold text-gray-700 mb-1.5">Tanggal Lahir</label>
                    <input type="date" id="tanggal" name="tanggal" required
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none input-transition" />
                    <p class="text-xs text-gray-400 mt-1.5">Format: dd/mm/yyyy</p>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="btnSubmit"
                    class="w-full py-3.5 px-6 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl text-sm transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed shadow-lg shadow-blue-200 hover:shadow-xl hover:shadow-blue-300">
                <span id="btnText">Kirim Tautan ke Email</span>
                <span id="btnSpinner" class="hidden"><span class="spinner"></span></span>
            </button>
        </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
        &copy; 2025 SMP Mumtaza &mdash; Email otomatis, jangan dibalas
    </p>
</div>

<script>
const form = document.getElementById('formTKA');
const btn = document.getElementById('btnSubmit');
const btnText = document.getElementById('btnText');
const btnSpinner = document.getElementById('btnSpinner');
const alert = document.getElementById('alert');
const alertMsg = document.getElementById('alertMessage');
const alertIcon = document.getElementById('alertIcon');

function showAlert(type, msg) {
    alert.className = 'flex items-start gap-3 p-4 rounded-xl text-sm font-medium mb-6';
    if (type === 'success') {
        alert.classList.add('bg-green-50', 'text-green-800', 'border', 'border-green-200');
        alertIcon.innerHTML = `<svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
    } else {
        alert.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
        alertIcon.innerHTML = `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
    }
    alertMsg.textContent = msg;
    alert.classList.remove('hidden');
}

function setLoading(loading) {
    btn.disabled = loading;
    btnText.classList.toggle('hidden', loading);
    btnSpinner.classList.toggle('hidden', !loading);
}

function formatDate(ddmmyyyy) {
    const parts = ddmmyyyy.split('-');
    if (parts.length !== 3) return '';
    const [year, month, day] = parts;
    return `${day}/${month}/${year}`;
}

function formatDateCompact(ddmmyyyy) {
    const parts = ddmmyyyy.split('-');
    if (parts.length !== 3) return '';
    const [year, month, day] = parts;
    return `${day}${month}${year}`;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alert.classList.add('hidden');

    const email = document.getElementById('email').value.trim();
    const nisn = document.getElementById('nisn').value.trim();
    const tanggal = document.getElementById('tanggal').value;

    if (!email || !nisn || !tanggal) {
        showAlert('error', 'Harap isi semua field.');
        return;
    }

    if (!/^\d{10}$/.test(nisn)) {
        showAlert('error', 'NISN harus 10 digit angka.');
        return;
    }

    setLoading(true);

    const webAppUrl = 'https://script.google.com/macros/s/AKfycbye5qcIW5JPCmjGFURyNRC9KOPQYLaZioyluWD-n_DC5ukIWl7eYBIM83pgl6gKs3ld/exec'; // GANTI dengan URL web app dari Google Apps Script

    try {
        const res = await fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email,
                nisn,
                tanggal,
                tanggalFormat: formatDate(tanggal),
                tanggalCompact: formatDateCompact(tanggal)
            })
        });

        showAlert('success', 'Permintaan berhasil dikirim! Silakan cek email Anda dalam beberapa menit.');

        document.getElementById('email').value = '';
        document.getElementById('nisn').value = '';
        document.getElementById('tanggal').value = '';

    } catch (err) {
        showAlert('error', 'Gagal mengirim. Silakan coba lagi nanti atau hubungi admin.');
    } finally {
        setLoading(false);
    }
});
</script>
</body>
</html>
