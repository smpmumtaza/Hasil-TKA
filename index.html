<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengiriman Hasil TKA SMP Mumtaza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .card-shadow {
            box-shadow: 0 20px 60px -12px rgba(0,0,0,0.08), 0 8px 24px -6px rgba(0,0,0,0.03);
        }
        .input-transition {
            transition: all 0.2s ease;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4 md:p-6">

<div class="w-full max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-200">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900">Ambil Hasil TKA</h1>
        <p class="text-gray-500 mt-2 text-sm md:text-base">Masukkan data Anda untuk mendapatkan tautan dokumen hasil Tes Kemampuan Akademik</p>
    </div>

    <!-- ===== NOTIFICATION MODAL ===== -->
    <div id="notifModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-8 text-center animate-[fadeIn_0.2s_ease]">
            <div id="notifIcon" class="w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center"></div>
            <h3 id="notifTitle" class="text-lg font-bold text-gray-900 mb-2"></h3>
            <p id="notifMessage" class="text-sm text-gray-500 mb-6"></p>
            <button onclick="closeNotif()" id="notifBtn" class="w-full py-2.5 rounded-xl text-sm font-semibold text-white transition">OK</button>
        </div>
    </div>

    <!-- Card Form -->
    <div class="bg-white rounded-2xl card-shadow p-6 md:p-8 border border-gray-100">
        <form id="formTKA" class="space-y-5">

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email Tujuan</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    </span>
                    <input type="email" id="email" name="email" required
                           class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none input-transition"
                           placeholder="contoh@email.com" />
                </div>
            </div>

            <!-- NISN + Date row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="nisn" class="block text-sm font-semibold text-gray-700 mb-1.5">NISN</label>
                    <input type="text" id="nisn" name="nisn" required maxlength="10" inputmode="numeric" pattern="\d*"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none input-transition"
                           placeholder="0107612901" />
                </div>
                <div>
                    <label for="tanggal" class="block text-sm font-semibold text-gray-700 mb-1.5">Tanggal Lahir <span class="text-gray-400 font-normal">(dd/mm/yyyy)</span></label>
                    <input type="date" id="tanggal" name="tanggal" required
                           min="2010-01-01" max="2011-12-31"
                           onfocus="this.showPicker?.()"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none input-transition" />
                    <p class="text-xs text-amber-600 mt-1.5">Rentang tahun: 2010 — 2011</p>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="btnSubmit"
                    class="w-full py-3.5 px-6 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl text-sm transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed shadow-lg shadow-blue-200 hover:shadow-xl hover:shadow-blue-300">
                <span id="btnText">Kirim Tautan ke Email</span>
                <span id="btnSpinner" class="hidden"><span class="spinner"></span></span>
            </button>
        </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-400 mt-6">
        &copy; 2025 SMP Mumtaza &mdash; Email otomatis, jangan dibalas
        &middot; <a href="admin/" class="hover:text-gray-600 underline underline-offset-2">Admin</a>
    </p>
</div>

<script>
const form = document.getElementById('formTKA');
const btn = document.getElementById('btnSubmit');
const btnText = document.getElementById('btnText');
const btnSpinner = document.getElementById('btnSpinner');
const notifModal = document.getElementById('notifModal');
const notifIcon = document.getElementById('notifIcon');
const notifTitle = document.getElementById('notifTitle');
const notifMessage = document.getElementById('notifMessage');
const notifBtn = document.getElementById('notifBtn');

function closeNotif() {
    notifModal.classList.add('hidden');
}

function showNotif(type, msg) {
    if (type === 'success') {
        notifIcon.className = 'w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center bg-green-100';
        notifIcon.innerHTML = `<svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>`;
        notifTitle.textContent = 'Permintaan Terkirim';
        notifBtn.className = 'w-full py-2.5 rounded-xl text-sm font-semibold text-white transition bg-green-600 hover:bg-green-700';
    } else {
        notifIcon.className = 'w-16 h-16 mx-auto mb-4 rounded-full flex items-center justify-center bg-red-100';
        notifIcon.innerHTML = `<svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`;
        notifTitle.textContent = 'Gagal!';
        notifBtn.className = 'w-full py-2.5 rounded-xl text-sm font-semibold text-white transition bg-red-600 hover:bg-red-700';
    }
    notifMessage.innerHTML = msg;
    notifModal.classList.remove('hidden');
}

function setLoading(loading) {
    btn.disabled = loading;
    btnText.classList.toggle('hidden', loading);
    btnSpinner.classList.toggle('hidden', !loading);
}

function formatDate(ddmmyyyy) {
    const parts = ddmmyyyy.split('-');
    if (parts.length !== 3) return '';
    const [year, month, day] = parts;
    return `${day}/${month}/${year}`;
}

function formatDateCompact(ddmmyyyy) {
    const parts = ddmmyyyy.split('-');
    if (parts.length !== 3) return '';
    const [year, month, day] = parts;
    return `${day}${month}${year}`;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const nisn = document.getElementById('nisn').value.trim();
    const tanggal = document.getElementById('tanggal').value;

    if (!email || !nisn || !tanggal) {
        showNotif('error', 'Harap isi semua field.');
        return;
    }

    if (!/^\d{10}$/.test(nisn)) {
        showNotif('error', 'NISN harus 10 digit angka.');
        return;
    }

    const year = parseInt(tanggal.split('-')[0], 10);
    if (year < 2010 || year > 2011) {
        showNotif('error', 'Tanggal lahir harus antara tahun 2010 — 2011.');
        return;
    }

    setLoading(true);

    const webAppUrl = 'https://script.google.com/macros/s/AKfycbz129t6BhQGxwvG4ipm5h6mNyhefOFsb1tpR2zmTMvq9Up7LITgdr65B5R4o6Os3ktb/exec'; // GANTI dengan URL web app dari Google Apps Script

    try {
        await fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email,
                nisn,
                tanggal,
                tanggalFormat: formatDate(tanggal),
                tanggalCompact: formatDateCompact(tanggal)
            })
        });

        showNotif('success', 'Email telah dikirim. Cek <b>Inbox</b> atau folder <b>Spam</b>.<br/>Jika masuk Spam, pilih <b>&quot;Laporkan bukan spam&quot;</b> agar email berikutnya masuk Inbox.');
        document.getElementById('email').value = '';
        document.getElementById('nisn').value = '';
        document.getElementById('tanggal').value = '';

    } catch (err) {
        showNotif('error', 'Gagal mengirim. Silakan coba lagi nanti.');
    } finally {
        setLoading(false);
    }
});
</script>
</body>
</html>
